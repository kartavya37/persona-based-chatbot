<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Scaler Mentors — Talk to the people who built it</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-active="kshitij">
    <div class="bg-orbs" aria-hidden="true">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
    </div>

    <main class="app">
      <header class="hero">
        <div class="brand">
          <span class="brand-dot"></span>
          <span class="brand-text">Scaler Mentors</span>
        </div>
        <h1>Talk to the people who built it.</h1>
        <p class="subtitle">
          Three real Scaler personalities. Three distinct minds. Pick one and ask anything.
        </p>
      </header>

      <section class="personas" aria-label="Choose a mentor">
        <button class="persona" data-person="kshitij" type="button" aria-pressed="true">
          <span class="persona-avatar" data-letters="K">K</span>
          <span class="persona-info">
            <span class="persona-name">Kshitij Mishra</span>
            <span class="persona-role">Head of Instructors · Dean, SST</span>
          </span>
          <span class="persona-tagline">The Socratic teacher who breaks ideas into layers.</span>
        </button>
        <button class="persona" data-person="anshuman" type="button" aria-pressed="false">
          <span class="persona-avatar" data-letters="An">An</span>
          <span class="persona-info">
            <span class="persona-name">Anshuman Singh</span>
            <span class="persona-role">Co-founder &amp; CTO, Scaler</span>
          </span>
          <span class="persona-tagline">Ex-Facebook engineer. Thinks in real-world systems.</span>
        </button>
        <button class="persona" data-person="abhimanyu" type="button" aria-pressed="false">
          <span class="persona-avatar" data-letters="Ab">Ab</span>
          <span class="persona-info">
            <span class="persona-name">Abhimanyu Saxena</span>
            <span class="persona-role">Co-founder, Scaler &amp; InterviewBit</span>
          </span>
          <span class="persona-tagline">Decisions through compass, map, and destination.</span>
        </button>
      </section>

      <section class="chat" aria-label="Conversation">
        <div class="chat-header">
          <div class="active-tag">
            <span class="active-dot"></span>
            <span>Chatting with</span>
            <strong id="active-label">Kshitij Mishra</strong>
          </div>
          <button id="clear" class="ghost-btn" type="button" title="Clear conversation">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            </svg>
            <span>Clear</span>
          </button>
        </div>

        <div id="messages" class="messages" aria-live="polite">
          <div id="empty-state" class="empty-state">
            <div class="empty-avatar" id="empty-avatar">K</div>
            <p class="empty-title" id="empty-title">Start a conversation with Kshitij Mishra</p>
            <p class="empty-hint">Try one of these to get a feel for how he thinks:</p>
            <div class="suggestions" id="suggestions"></div>
          </div>
        </div>

        <form id="form" class="composer" autocomplete="off">
          <textarea
            id="query"
            placeholder="Ask anything…  (Enter to send, Shift+Enter for a new line)"
            rows="1"
            required
          ></textarea>
          <button id="send" type="submit" class="send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h14" />
              <path d="M13 6l6 6-6 6" />
            </svg>
          </button>
        </form>
      </section>

      <footer class="foot">
        <span>Built with Bun + Groq · Llama 3.3 70B</span>
      </footer>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
