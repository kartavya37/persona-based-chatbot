<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Scaler Mentors</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-active="kshitij">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="logo">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            <span>Scaler Mentors</span>
          </div>
        </div>

        <nav class="persona-list" aria-label="Choose a mentor">
          <button class="persona" data-person="kshitij" type="button" aria-pressed="true">
            <span class="persona-avatar">K</span>
            <span class="persona-info">
              <span class="persona-name">Kshitij Mishra</span>
              <span class="persona-role">Head of Instructors</span>
            </span>
          </button>
          <button class="persona" data-person="anshuman" type="button" aria-pressed="false">
            <span class="persona-avatar">An</span>
            <span class="persona-info">
              <span class="persona-name">Anshuman Singh</span>
              <span class="persona-role">Co-founder &amp; CEO</span>
            </span>
          </button>
          <button class="persona" data-person="abhimanyu" type="button" aria-pressed="false">
            <span class="persona-avatar">Ab</span>
            <span class="persona-info">
              <span class="persona-name">Abhimanyu Saxena</span>
              <span class="persona-role">Co-founder, Scaler</span>
            </span>
          </button>
        </nav>

        <div class="sidebar-foot">
          <p>Pick a mentor and ask a real question. Conversation resets when you switch.</p>
        </div>
      </aside>

      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle mentor list" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <main class="chat" aria-label="Conversation">
        <header class="chat-top">
          <div class="active-card">
            <span class="active-avatar" id="top-avatar">K</span>
            <div class="active-meta">
              <span class="active-name" id="active-label">Kshitij Mishra</span>
              <span class="active-role" id="active-role">Head of Instructors · Dean, SST</span>
            </div>
          </div>
          <button id="clear" class="clear-btn" type="button" title="Clear conversation">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
            </svg>
            <span>Clear</span>
          </button>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <div id="empty-state" class="empty-state">
            <p class="empty-title" id="empty-title">Start with a question</p>
            <p class="empty-hint" id="empty-hint">Or pick one to see how Kshitij thinks:</p>
            <div class="suggestions" id="suggestions"></div>
          </div>
        </div>

        <form id="form" class="composer" autocomplete="off">
          <div class="composer-box">
            <textarea
              id="query"
              placeholder="Ask anything…"
              rows="1"
              required
            ></textarea>
            <button id="send" type="submit" class="send-btn" aria-label="Send message">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 12h14" />
                <path d="M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
          <!-- <div class="composer-hint">
            <kbd>Enter</kbd> to send <span class="dot">·</span> <kbd>Shift</kbd> + <kbd>Enter</kbd> for new line
          </div> -->
        </form>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
